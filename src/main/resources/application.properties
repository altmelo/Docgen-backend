# Configuração do Banco de Dados (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/docgen_db}
spring.datasource.username=${DB_USERNAME:docgen_user}
spring.datasource.password=${DB_PASSWORD:docgen_4223}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (Migrações)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# spring.flyway.locations=classpath:db/migration

# Configuração da Aplicação
server.port=${SERVER_PORT:8080}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
